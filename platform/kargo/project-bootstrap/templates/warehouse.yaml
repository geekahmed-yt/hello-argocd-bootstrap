apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: {{ .Values.projectName | quote }}
  namespace: {{ .Values.projectName | quote }}
  annotations:
    gitops-pilot.io/source-repository: {{ .Values.sourceRepository | quote }}
spec:
  interval: 1m
  subscriptions:
    - image:
        repoURL: {{ printf "%s/%s" .Values.dockerhubOrg .Values.imageName | quote }}
        imageSelectionStrategy: NewestBuild
        strictSemvers: false
        pullSecretRef:
          name: dockerhub-creds
