apiVersion: kargo.akuity.io/v1alpha1
kind: ClusterPromotionTask
metadata:
  name: {{ .Values.clusterPromotionTask.name | quote }}
spec:
  steps:
    - uses: git-clone
      config:
        repoURL: ${{ "{{" }} vars.gitRepo {{ "}}" }}
        checkout:
          - branch: ${{ "{{" }} vars.sourceBranch {{ "}}" }}
            path: ./src
    - uses: kustomize-set-image
      as: update-image
      config:
        path: ${{ "{{" }} vars.overlayPath {{ "}}" }}
        images:
          - image: ${{ "{{" }} vars.imageName {{ "}}" }}
            newName: ${{ "{{" }} vars.imageRepo {{ "}}" }}
            tag: ${{ "{{" }} imageFrom(vars.imageRepo).Tag {{ "}}" }}
    - uses: git-commit
      config:
        path: ./src
        message: |
          ${{ "{{" }} ctx.stage {{ "}}" }}: set image ${{ "{{" }} vars.imageRepo {{ "}}" }}:${{ "{{" }} imageFrom(vars.imageRepo).Tag {{ "}}" }}
    - uses: git-push
      config:
        path: ./src
        targetBranch: ${{ "{{" }} vars.sourceBranch {{ "}}" }}