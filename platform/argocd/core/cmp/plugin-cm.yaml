apiVersion: v1
kind: ConfigMap
metadata:
  name: cmp-hello-infra-resolver-plugin
  namespace: argocd
data:
  # This file is mounted at /home/argocd/cmp-server/config/plugin.yaml
  # inside the hello-infra-resolver sidecar and registers the CMP with Argo CD.
  plugin.yaml: |
    apiVersion: argoproj.io/v1alpha1
    kind: ConfigManagementPlugin
    metadata:
      name: hello-infra-resolver
    spec:
      version: v1.0

      # Auto-discover repos that declare a service contract at their root.
      # Use a command so missing files return non-match (exit 1), not an error.
      discover:
        find:
          command:
            - sh
            - -c
            - |
              d="${PWD}"
              while [ "${d}" != "/" ]; do
                if [ -f "${d}/service-contract.yaml" ]; then
                  # Emit a match and succeed.
                  echo "${d}/service-contract.yaml"
                  exit 0
                fi
                d="$(dirname "${d}")"
              done
              # No match is not an error for Argo CMP discover.
              # Return success with empty output so the repo is skipped.
              exit 0

      init:
        command:
          - sh
          - -c
          - |
            echo "hello-infra-resolver CMP ready"
            kustomize version
            /cmp-tools/yq --version

      generate:
        command:
          - sh
          - /scripts/resolve-infra.sh
