apiVersion: v1
kind: ConfigMap
metadata:
  name: cmp-resolve-infra-script
  namespace: argocd
data:
  resolve-infra.sh: |
    #!/bin/sh
    # resolve-infra.sh
    #
    # Argo CD CMP generator script for the hello-infra-resolver plugin.
    #
    # Flow:
    #   1. Read spec.service.containerName and spec.infra from service-contract.yaml
    #   2. For each infra dependency, copy the platform component into a local tmpdir
    #   3. Replace the __CONTAINER_NAME__ placeholder in the copied component using sed
    #   4. Build a transient kustomization that references the env overlay + components
    #   5. Output manifests via kustomize build
    #
    # Environment variables:
    #   ENVIRONMENT    Target overlay name (default: prod)
    #   PLATFORM_REPO  Kustomize-compatible URL to hello-platform-global-config
    set -eu

    YQ="/cmp-tools/yq"
    PLATFORM_REPO="${PLATFORM_REPO:-github.com/geekahmed-yt/hello-platform-global-config}"
    SOURCE_DIR="${PWD}"

    detect_environment() {
      path="$1"
      base="$(basename "${path}")"
      parent="$(basename "$(dirname "${path}")")"
      if [ "${parent}" = "overlays" ]; then
        printf "%s" "${base}"
        return 0
      fi
      return 1
    }

    if ENV_FROM_SOURCE="$(detect_environment "${SOURCE_DIR}")"; then
      ENVIRONMENT="${ENV_FROM_SOURCE}"
    elif ENV_FROM_APP_PATH="$(printf "%s" "${ARGOCD_APP_SOURCE_PATH:-}" | sed -n 's|.*/overlays/\([^/]*\).*|\1|p')" && [ -n "${ENV_FROM_APP_PATH}" ]; then
      ENVIRONMENT="${ENV_FROM_APP_PATH}"
    elif [ -n "${ENVIRONMENT:-}" ]; then
      ENVIRONMENT="${ENVIRONMENT}"
    else
      echo "Unable to detect environment. Expected source path under overlays/<env> or set ENVIRONMENT." >&2
      exit 1
    fi

    find_contract_upward() {
      d="$1"
      while [ "${d}" != "/" ]; do
        if [ -f "${d}/service-contract.yaml" ]; then
          printf "%s/service-contract.yaml" "${d}"
          return 0
        fi
        d="$(dirname "${d}")"
      done
      return 1
    }

    CONTRACT=""
    REPO_ROOT="${SOURCE_DIR}"
    if FOUND_CONTRACT="$(find_contract_upward "${SOURCE_DIR}")"; then
      CONTRACT="${FOUND_CONTRACT}"
      REPO_ROOT="$(dirname "${CONTRACT}")"
    fi

    if [ -d "${REPO_ROOT}/overlays/${ENVIRONMENT}" ]; then
      OVERLAY_PATH="${REPO_ROOT}/overlays/${ENVIRONMENT}"
    else
      # When Argo source.path already points to an overlay, use it directly.
      OVERLAY_PATH="${SOURCE_DIR}"
    fi
    TMPDIR="$(mktemp -d)"
    PLATFORM_LOCAL="${TMPDIR}/platform-repo"

    normalize_repo_url() {
      repo="$1"
      case "${repo}" in
        https://*|http://*)
          printf "%s" "${repo}"
          ;;
        *)
          printf "https://%s" "${repo}"
          ;;
      esac
    }

    cleanup() { rm -rf "${TMPDIR}"; }
    trap cleanup EXIT

    KUST="${TMPDIR}/kustomization.yaml"
    PLATFORM_REPO_URL="$(normalize_repo_url "${PLATFORM_REPO}")"

    # Fetch platform components into local disk so shell tools (cp/sed/find)
    # can work against real files. Kustomize remote URLs are not filesystem paths.
    git clone --depth 1 "${PLATFORM_REPO_URL}" "${PLATFORM_LOCAL}" >/dev/null 2>&1

    # ------------------------------------------------------------------
    # 1. Write base overlay reference
    # ------------------------------------------------------------------
    cat > "${KUST}" <<EOF
    apiVersion: kustomize.config.k8s.io/v1beta1
    kind: Kustomization
    bases:
      - ${OVERLAY_PATH}
    EOF

    # ------------------------------------------------------------------
    # 2. Short-circuit if no service contract present
    # ------------------------------------------------------------------
    if [ -z "${CONTRACT}" ] || [ ! -f "${CONTRACT}" ]; then
      kustomize build "${TMPDIR}"
      exit 0
    fi

    CONTAINER_NAME="$("${YQ}" e '.spec.service.containerName // "app"' "${CONTRACT}")"
    INFRA_KEYS="$("${YQ}" e '.spec.infra | keys | .[]' "${CONTRACT}" 2>/dev/null || true)"

    COMPONENTS=""
    for KEY in ${INFRA_KEYS}; do
      ENGINE="$("${YQ}" e ".spec.infra.${KEY}.engine // \"\"" "${CONTRACT}")"
      [ -z "${ENGINE}" ] && continue

      COMPONENT_SRC="${PLATFORM_LOCAL}/components/infra/${KEY}-${ENGINE}"
      COMPONENT_LOCAL="${TMPDIR}/components/${KEY}-${ENGINE}"

      # ------------------------------------------------------------------
      # 3. Copy the platform component locally so we can mutate it safely
      # ------------------------------------------------------------------
      mkdir -p "${COMPONENT_LOCAL}"
      cp -r "${COMPONENT_SRC}/." "${COMPONENT_LOCAL}/"

      # ------------------------------------------------------------------
      # 4. Substitute __CONTAINER_NAME__ with the value from service-contract.
      #    The strategic merge patch in the component uses this as the
      #    containers list merge key — no index assumed, no case statements.
      # ------------------------------------------------------------------
      find "${COMPONENT_LOCAL}" -type f -name "*.yaml" | while read -r f; do
        sed -i "s/__CONTAINER_NAME__/${CONTAINER_NAME}/g" "${f}"
      done

      COMPONENTS="${COMPONENTS}  - ./components/${KEY}-${ENGINE}\n"
    done

    # ------------------------------------------------------------------
    # 5. Append resolved components to the transient kustomization
    # ------------------------------------------------------------------
    if [ -n "${COMPONENTS}" ]; then
      printf "\ncomponents:\n%b" "${COMPONENTS}" >> "${KUST}"
    fi

    kustomize build "${TMPDIR}"
