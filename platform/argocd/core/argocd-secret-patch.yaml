# Patches argocd-secret to ensure server.secretkey is present for Argo CD server initialization.
# Argo CD uses this key to encrypt session tokens and other sensitive data.
apiVersion: v1
kind: Secret
metadata:
  name: argocd-secret
  namespace: argocd
data:
  # Generated via: openssl rand -base64 32
  # Replace with your own secure key if needed
  server.secretkey: dFlGOWZxK1hzWTVGWkR4UjRJUGQycTBqVXpCVEpnN3MyWjQ=
