apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: hello-manifests
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error

  strategy:
    type: RollingSync
    rollingSync:
      steps:
        - matchExpressions:
            - key: envLabel
              operator: In
              values:
                - default

  syncPolicy:
    applicationsSync: create-update
    preserveResourcesOnDeletion: true

  generators:
    - matrix:
        generators:
          - scmProvider:
              cloneProtocol: https
              github:
                organization: geekahmed-yt
                allBranches: false
                tokenRef:
                  secretName: argocd-github-token
                  key: token
              filters:
                - repositoryMatch: '^hello.*manifests$'
          - clusters:
              selector:
                matchExpressions:
                  - key: envLabel
                    operator: Exists

  template:
    metadata:
      name: '{{ .repository }}'
      labels:
        envLabel: '{{ index .metadata.labels "envLabel" }}'
        app.kubernetes.io/managed-by: argocd-applicationset
    spec:
      project: platform
      source:
        repoURL: '{{ .url }}'
        targetRevision: main
        path: '{{ if eq (index .metadata.labels "envLabel") "default" }}overlays/dev{{ else }}overlays/{{ index .metadata.labels "envLabel" }}{{ end }}'
      destination:
        server: '{{ .server }}'
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=true
