apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: hello-manifests
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error

  strategy:
    type: RollingSync
    rollingSync:
      steps:
        - matchExpressions:
            - key: envLabel
              operator: In
              values:
                - default

  syncPolicy:
    applicationsSync: create-update
    preserveResourcesOnDeletion: true

  generators:
    - matrix:
        generators:
          - scmProvider:
              cloneProtocol: https
              github:
                organization: geekahmed-yt
                allBranches: false
                tokenRef:
                  secretName: argocd-github-token
                  key: token
              filters:
                - repositoryMatch: '^hello.*manifests$'
          - list:
              elements:
                - envLabel: default
                  destinationServer: https://kubernetes.default.svc
                  destinationNamespace: argocd
                  manifestPath: .
                  manifestRevision: main

  template:
    metadata:
      name: '{{ .repository }}'
      labels:
        envLabel: '{{ .envLabel }}'
        app.kubernetes.io/managed-by: argocd-applicationset
    spec:
      project: platform
      source:
        repoURL: '{{ .url }}'
        targetRevision: '{{ .manifestRevision }}'
        path: '{{ .manifestPath }}'
      destination:
        server: '{{ .destinationServer }}'
        namespace: '{{ .destinationNamespace }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=true
