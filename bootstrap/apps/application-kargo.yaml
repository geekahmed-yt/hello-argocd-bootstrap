apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kargo
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: kargo
  sources:
    - repoURL: ghcr.io/akuity/kargo-charts
      chart: kargo
      targetRevision: 1.7.0
      helm:
        valueFiles:
          - $values/platform/argocd/kargo/values.yaml
    - repoURL: https://github.com/geekahmed-yt/hello-argocd-bootstrap.git
      targetRevision: main
      ref: values
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
