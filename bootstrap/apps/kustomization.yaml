apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: bootstrap-params
    envs:
      - bootstrap-params.env

replacements:
  - source:
      kind: ConfigMap
      name: bootstrap-params
      fieldPath: data.GITHUB_ORG
    targets:
      - select:
          kind: ApplicationSet
          name: hello-manifests
        fieldPaths:
          - spec.generators.0.matrix.generators.0.scmProvider.github.organization
      - select:
          kind: ApplicationSet
          name: kargo-projects
        fieldPaths:
          - spec.generators.0.scmProvider.github.organization
  - source:
      kind: ConfigMap
      name: bootstrap-params
      fieldPath: data.DOCKERHUB_ORG
    targets:
      - select:
          kind: ApplicationSet
          name: kargo-projects
        fieldPaths:
          - spec.template.spec.source.helm.parameters.2.value

resources:
  - application-argocd-core.yaml
  - application-argocd-projects-rbac.yaml
  - application-argocd-repos.yaml
  - application-cert-manager.yaml
  - application-kargo.yaml
  - applicationset-kargo-projects.yaml
  - applicationset-hello-manifests.yaml
