apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-projects-rbac
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  project: default
  source:
    repoURL: https://github.com/geekahmed-yt/hello-argocd-bootstrap.git
    targetRevision: main
    path: platform/argocd/projects-rbac
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
